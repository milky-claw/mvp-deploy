<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Minifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #00d9ff; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 1200px; }
    textarea { width: 100%; height: 400px; background: #16213e; border: 1px solid #0f3460; color: #eee; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 14px; resize: vertical; }
    textarea:focus { outline: none; border-color: #00d9ff; }
    .buttons { margin: 1rem 0; display: flex; gap: 0.5rem; }
    button { background: #e94560; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    button:hover { background: #ff6b6b; }
    button.secondary { background: #0f3460; }
    button.secondary:hover { background: #1a4a7a; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; }
    .status.success { background: #1b4332; color: #95d5b2; display: block; }
    .status.error { background: #5c1a1a; color: #f8a5a5; display: block; }
    .stats { margin-top: 0.5rem; color: #888; font-size: 0.9rem; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>🔧 JSON Minifier</h1>
  <div class="buttons">
    <button onclick="minify()">Minify</button>
    <button onclick="prettify()">Prettify</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
    <button class="secondary" onclick="copyOutput()">Copy Output</button>
  </div>
  <div class="container">
    <div>
      <h3 style="margin-bottom: 0.5rem; color:#888">Input JSON</h3>
      <textarea id="input" placeholder='{"key": "value"}'></textarea>
    </div>
    <div>
      <h3 style="margin-bottom: 0.5rem; color:#888">Output</h3>
      <textarea id="output" readonly placeholder="Result..."></textarea>
    </div>
  </div>
  <div id="status" class="status"></div>
  <div class="stats" id="stats"></div>
  <script>
    function showStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (isError ? 'error' : 'success');
    }
    function minify() {
      try {
        const input = document.getElementById('input').value;
        const parsed = JSON.parse(input);
        const minified = JSON.stringify(parsed);
        document.getElementById('output').value = minified;
        updateStats(input.length, minified.length);
        showStatus('Minified successfully!');
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, true);
      }
    }
    function prettify() {
      try {
        const input = document.getElementById('input').value;
        const parsed = JSON.parse(input);
        const pretty = JSON.stringify(parsed, null, 2);
        document.getElementById('output').value = pretty;
        updateStats(input.length, pretty.length);
        showStatus('Prettified successfully!');
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, true);
      }
    }
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('status').className = 'status';
      document.getElementById('stats').textContent = '';
    }
    function copyOutput() {
      const output = document.getElementById('output').value;
      if (!output) return;
      navigator.clipboard.writeText(output);
      showStatus('Copied to clipboard!');
    }
    function updateStats(inpLen, outLen) {
      document.getElementById('stats').textContent = `Input: ${inpLen} chars → Output: ${outLen} chars (${Math.round((1 - outLen/inpLen) * 100)}% reduction)`;
    }
  </script>
</body>
</html>
