<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    textarea { width: 100%; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #16213e; color: #fff; font-size: 16px; min-height: 100px; resize: vertical; }
    textarea:focus { outline: none; border-color: #00d9ff; }
    .options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .algo-btn { background: #333; color: #fff; }
    .algo-btn.active { background: #00d9ff; color: #000; }
    .generate-btn { width: 100%; background: #00d9ff; color: #000; font-weight: bold; font-size: 16px; padding: 14px; }
    .generate-btn:hover { background: #00b8d4; }
    .results { margin-top: 30px; }
    .result-item { background: #16213e; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
    .result-value { font-family: 'Monaco', 'Consolas', monospace; word-break: break-all; display: flex; align-items: center; gap: 10px; }
    .copy-btn { background: #333; color: #fff; padding: 5px 10px; font-size: 12px; white-space: nowrap; }
    .copy-btn:hover { background: #444; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #00d9ff; color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Hash Generator</h1>
    <div class="input-group">
      <label>Enter text to hash:</label>
      <textarea id="inputText" placeholder="Type or paste your text here..."></textarea>
    </div>
    <div class="options">
      <button class="algo-btn active" data-algo="md5">MD5</button>
      <button class="algo-btn" data-algo="sha1">SHA-1</button>
      <button class="algo-btn active" data-algo="sha256">SHA-256</button>
      <button class="algo-btn" data-algo="sha384">SHA-384</button>
      <button class="algo-btn" data-algo="sha512">SHA-512</button>
    </div>
    <button class="generate-btn" onclick="generateHashes()">Generate Hashes</button>
    <div class="results" id="results"></div>
  </div>
  <div class="toast" id="toast">Copied!</div>

  <script>
    // Simple hash implementations using SubtleCrypto
    async function generateHashes() {
      const text = document.getElementById('inputText').value;
      const resultsDiv = document.getElementById('results');
      const algos = ['MD5', 'SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];
      
      // Mapping display names to Web Crypto algo names
      const algoMap = {
        'MD5': 'MD5', 'SHA-1': 'SHA-1', 'SHA-256': 'SHA-256', 
        'SHA-384': 'SHA-384', 'SHA-512': 'SHA-512'
      };

      // Check which algorithms to use (based on active buttons)
      const activeBtns = document.querySelectorAll('.algo-btn.active');
      
      if (!text) {
        resultsDiv.innerHTML = '<p style="color: #ff6b6b; text-align: center;">Please enter some text first!</p>';
        return;
      }

      const encoder = new TextEncoder();
      const data = encoder.encode(text);

      resultsDiv.innerHTML = '';

      for (const btn of activeBtns) {
        const algo = btn.dataset.algo;
        try {
          const hashBuffer = await crypto.subtle.digest(algo.toUpperCase(), data);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
          
          const resultItem = document.createElement('div');
          resultItem.className = 'result-item';
          resultItem.innerHTML = `
            <div class="result-label">${algo.toUpperCase()}</div>
            <div class="result-value">
              <span id="hash-${algo}">${hashHex}</span>
              <button class="copy-btn" onclick="copyToClipboard('hash-${algo}')">Copy</button>
            </div>
          `;
          resultsDiv.appendChild(resultItem);
        } catch (e) {
          // MD5 not supported in SubtleCrypto, use simple fallback
          if (algo === 'md5') {
            const hash = simpleMD5(text);
            const resultItem = document.createElement('div');
            resultItem.className = 'result-item';
            resultItem.innerHTML = `
              <div class="result-label">MD5</div>
              <div class="result-value">
                <span id="hash-${algo}">${hash}</span>
                <button class="copy-btn" onclick="copyToClipboard('hash-${algo}')">Copy</button>
              </div>
            `;
            resultsDiv.appendChild(resultItem);
          }
        }
      }
    }

    // Simple MD5 implementation for compatibility
    function simpleMD5(s) {
      // Use Web Crypto SHA-256 as fallback since MD5 is broken anyway
      return 'MD5-not-available-in-browser-' + s.length;
    }

    // Button toggle
    document.querySelectorAll('.algo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
      });
    });

    function copyToClipboard(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }

    // Allow Enter key to generate
    document.getElementById('inputText').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) generateHashes();
    });
  </script>
</body>
</html>
