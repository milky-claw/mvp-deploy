<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVP Deploy</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; max-width: 800px; margin: 0 auto; }
    h1 { color: #00d9ff; }
    a { color: #a855f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .mvp { background: #16213e; padding: 1rem; margin: 0.5rem 0; border-radius: 8px; }
    .mvp a { font-size: 1.2rem; font-weight: 600; }
  </style>
</head>
<body>
  <h1>🚀 MVP Deploy</h1>
  <p>Quick developer tools built in hours.</p>
  <div id="list"></div>
  <script>
    const mvps = [
      [40, 'JSON Minifier', 'mvp40-json-minifier/'],
      [41, 'UUID Generator', 'mvp41-uuid-generator/'],
      [42, 'HTML Encoder', 'mvp42-html-encoder/'],
      [37, 'Hash Generator', 'mvp37-hash-generator/'],
      [38, 'Regex Tester', 'mvp38-regex-tester/'],
      [39, 'Color Palette', 'mvp39-color-palette/'],
    ];
    document.getElementById('list').innerHTML = mvps.map(([n, d, p]) => 
      `<div class="mvp"><a href="${p}">MVP ${n}: ${d}</a></div>`
    ).join('');
  </script>
</body>
</html>
