<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #ff6b9d; }
    .panel { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    textarea, input[type="text"] { width: 100%; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #0f0f23; color: #fff; font-size: 16px; }
    textarea { min-height: 120px; resize: vertical; font-family: 'Monaco', monospace; }
    input[type="text"] { font-family: 'Monaco', monospace; }
    textarea:focus, input:focus { outline: none; border-color: #ff6b9d; }
    .flags { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .flag-btn { padding: 8px 16px; border: 2px solid #333; border-radius: 6px; background: transparent; color: #888; cursor: pointer; font-weight: 600; }
    .flag-btn.active { border-color: #ff6b9d; background: #ff6b9d; color: #000; }
    .test-btn { width: 100%; background: #ff6b9d; color: #000; font-weight: bold; font-size: 16px; padding: 14px; border: none; border-radius: 8px; cursor: pointer; }
    .test-btn:hover { background: #ff4785; }
    .results { margin-top: 20px; }
    .match { background: #1a4a3a; border: 1px solid #2ecc71; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .no-match { background: #4a1a1a; border: 1px solid #e74c3c; padding: 12px; border-radius: 8px; color: #ff6b6b; }
    .match-count { text-align: center; margin-bottom: 15px; font-size: 18px; }
    .match-count .count { color: #2ecc71; font-weight: bold; font-size: 24px; }
    .match-item { background: #0f0f23; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-family: 'Monaco', monospace; }
    .match-index { color: #888; font-size: 12px; }
    .group { color: #ffd93d; }
    .error { color: #ff6b6b; background: #4a1a1a; padding: 10px; border-radius: 8px; margin-top: 10px; }
    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
    .preset-btn { background: #333; color: #aaa; padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
    .preset-btn:hover { background: #444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Regex Tester</h1>
    <div class="panel">
      <label>Pattern:</label>
      <input type="text" id="pattern" placeholder="Enter regex pattern...">
      <div class="presets">
        <button class="preset-btn" onclick="setPattern('[a-z]+')">Email</button>
        <button class="preset-btn" onclick="setPattern('\\d{3}-\\d{3}-\\d{4}')">Phone</button>
        <button class="preset-btn" onclick="setPattern('https?://[^\\s]+')">URL</button>
        <button class="preset-btn" onclick="setPattern('#[0-9A-Fa-f]{6}')">Hex Color</button>
        <button class="preset-btn" onclick="setPattern('\\b\\d+\\b')">Numbers</button>
      </div>
      <div class="flags">
        <button class="flag-btn active" data-flag="g" onclick="toggleFlag(this)">g (global)</button>
        <button class="flag-btn active" data-flag="i" onclick="toggleFlag(this)">i (case-insensitive)</button>
        <button class="flag-btn" data-flag="m" onclick="toggleFlag(this)">m (multiline)</button>
      </div>
    </div>
    <div class="panel">
      <label>Test String:</label>
      <textarea id="testString" placeholder="Enter text to test against...">Hello, my email is test@example.com and my phone is 555-123-4567.
Visit https://example.com for more info.
My favorite color is #FF6B9D</textarea>
    </div>
    <button class="test-btn" onclick="testRegex()">Test Regex</button>
    <div class="results" id="results"></div>
  </div>

  <script>
    let activeFlags = ['g', 'i'];

    function toggleFlag(btn) {
      const flag = btn.dataset.flag;
      btn.classList.toggle('active');
      if (activeFlags.includes(flag)) {
        activeFlags = activeFlags.filter(f => f !== flag);
      } else {
        activeFlags.push(flag);
      }
    }

    function setPattern(p) {
      document.getElementById('pattern').value = p;
    }

    function testRegex() {
      const pattern = document.getElementById('pattern').value;
      const testString = document.getElementById('testString').value;
      const resultsDiv = document.getElementById('results');

      if (!pattern) {
        resultsDiv.innerHTML = '<div class="error">Please enter a pattern</div>';
        return;
      }

      try {
        const regex = new RegExp(pattern, activeFlags.join(''));
        const matches = testString.match(regex);

        if (!matches) {
          resultsDiv.innerHTML = '<div class="no-match">No matches found</div>';
          return;
        }

        let html = `<div class="match-count"><span class="count">${matches.length}</span> match(es) found</div>`;
        
        matches.forEach((match, index) => {
          html += `<div class="match"><div class="match-index">Match ${index + 1}</div><div class="match-item">${escapeHtml(match)}</div></div>`;
        });

        resultsDiv.innerHTML = html;
      } catch (e) {
        resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(e.message)}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Quick test on load
    testRegex();
  </script>
</body>
</html>
