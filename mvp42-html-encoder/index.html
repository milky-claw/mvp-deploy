<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Encoder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 2rem; }
    h1 { margin-bottom: 0.5rem; color: #f97316; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 1200px; }
    textarea { width: 100%; height: 400px; background: #16213e; border: 1px solid #0f3460; color: #eee; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 14px; resize: vertical; }
    textarea:focus { outline: none; border-color: #f97316; }
    .buttons { margin: 1rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button { background: #f97316; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    button:hover { background: #fb923c; }
    button.secondary { background: #0f3460; }
    button.secondary:hover { background: #1a4a7a; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; }
    .status.success { background: #1b4332; color: #95d5b2; display: block; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>🏷️ HTML Entity Encoder/Decoder</h1>
  <p class="subtitle">Encode special characters to HTML entities or decode them back</p>
  
  <div class="buttons">
    <button onclick="encode()">Encode</button>
    <button onclick="decode()">Decode</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
    <button class="secondary" onclick="copyOutput()">Copy</button>
  </div>
  
  <div class="container">
    <div>
      <h3 style="margin-bottom: 0.5rem; color:#888">Input</h3>
      <textarea id="input" placeholder="Enter text with special chars: <>&'""></textarea>
    </div>
    <div>
      <h3 style="margin-bottom: 0.5rem; color:#888">Output</h3>
      <textarea id="output" readonly placeholder="Result..."></textarea>
    </div>
  </div>
  <div id="status" class="status"></div>
  
  <script>
    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status success';
    }
    function encode() {
      const input = document.getElementById('input').value;
      const encoded = input.replace(/[\u00A0-\u9999<>&'"]/g, char => '&#' + char.charCodeAt(0) + ';');
      document.getElementById('output').value = encoded;
      showStatus('Encoded successfully!');
    }
    function decode() {
      try {
        const input = document.getElementById('input').value;
        const textarea = document.createElement('textarea');
        textarea.innerHTML = input;
        document.getElementById('output').value = textarea.value;
        showStatus('Decoded successfully!');
      } catch (e) {
        showStatus('Decode error: ' + e.message);
      }
    }
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('status').className = 'status';
    }
    function copyOutput() {
      const output = document.getElementById('output').value;
      if (!output) return;
      navigator.clipboard.writeText(output);
      showStatus('Copied to clipboard!');
    }
  </script>
</body>
</html>
