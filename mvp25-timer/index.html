<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⏱️ Timer / Stopwatch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; }
    .container { text-align: center; background: #16213e; padding: 2rem 3rem; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    h1 { margin-bottom: 1.5rem; color: #e94560; }
    .display { font-size: 4rem; font-weight: 700; font-variant-numeric: tabular-nums; margin: 1.5rem 0; letter-spacing: 2px; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: #0f3460; padding: 4px; border-radius: 8px; }
    .tab { padding: 0.5rem 1.5rem; border: none; background: transparent; color: #888; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
    .tab.active { background: #e94560; color: #fff; }
    .btn-group { display: flex; gap: 0.75rem; justify-content: center; }
    button { padding: 0.75rem 2rem; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; font-weight: 600; }
    button:active { transform: scale(0.96); }
    .btn-start { background: #4ecca3; color: #1a1a2e; }
    .btn-stop { background: #e94560; color: #fff; }
    .btn-reset { background: #0f3460; color: #fff; }
    .lap-times { margin-top: 1.5rem; max-height: 200px; overflow-y: auto; width: 100%; }
    .lap { padding: 0.5rem; background: #0f3460; margin: 4px 0; border-radius: 4px; font-size: 0.9rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⏱️ Timer / Stopwatch</h1>
    
    <div class="tabs">
      <button class="tab active" data-mode="stopwatch">Stopwatch</button>
      <button class="tab" data-mode="timer">Timer</button>
    </div>
    
    <div class="display" id="display">00:00:00.00</div>
    
    <div class="btn-group">
      <button class="btn-start" id="startBtn">Start</button>
      <button class="btn-stop hidden" id="stopBtn">Stop</button>
      <button class="btn-reset" id="resetBtn">Reset</button>
    </div>
    
    <div class="lap-times" id="lapTimes"></div>
    
    <!-- Timer input (hidden by default) -->
    <div id="timerInput" class="hidden" style="margin-top: 1rem;">
      <input type="number" id="timerMinutes" placeholder="Minutes" min="0" max="999" style="width: 80px; padding: 0.5rem; border-radius: 6px; border: none;">
      <input type="number" id="timerSeconds" placeholder="Seconds" min="0" max="59" style="width: 80px; padding: 0.5rem; border-radius: 6px; border: none;">
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapTimes = document.getElementById('lapTimes');
    const tabs = document.querySelectorAll('.tab');
    const timerInput = document.getElementById('timerInput');
    const timerMinutes = document.getElementById('timerMinutes');
    const timerSeconds = document.getElementById('timerSeconds');

    let mode = 'stopwatch';
    let running = false;
    let startTime = 0;
    let elapsed = 0;
    let interval = null;
    let timerTarget = 0;

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const centiseconds = Math.floor((ms % 1000) / 10);
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
    }

    function update() {
      if (mode === 'stopwatch') {
        const now = Date.now();
        elapsed = now - startTime;
        display.textContent = formatTime(elapsed);
      } else {
        const remaining = timerTarget - Date.now();
        if (remaining <= 0) {
          display.textContent = '00:00:00.00';
          stop();
          alert('Time\'s up!');
          return;
        }
        display.textContent = formatTime(remaining);
      }
    }

    function start() {
      if (running) return;
      running = true;
      
      if (mode === 'stopwatch') {
        startTime = Date.now() - elapsed;
        interval = setInterval(update, 10);
      } else {
        const mins = parseInt(timerMinutes.value) || 0;
        const secs = parseInt(timerSeconds.value) || 0;
        timerTarget = Date.now() + (mins * 60 + secs) * 1000;
        interval = setInterval(update, 10);
      }
      
      startBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
    }

    function stop() {
      if (!running) return;
      running = false;
      clearInterval(interval);
      startBtn.classList.remove('hidden');
      stopBtn.classList.add('hidden');
      
      if (mode === 'stopwatch' && elapsed > 0) {
        const lap = document.createElement('div');
        lap.className = 'lap';
        lap.textContent = `Lap ${lapTimes.children.length + 1}: ${formatTime(elapsed)}`;
        lapTimes.insertBefore(lap, lapTimes.firstChild);
      }
    }

    function reset() {
      stop();
      elapsed = 0;
      display.textContent = '00:00:00.00';
      lapTimes.innerHTML = '';
      timerMinutes.value = '';
      timerSeconds.value = '';
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        reset();
        timerInput.classList.toggle('hidden', mode !== 'timer');
      });
    });

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
